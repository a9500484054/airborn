<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#2563EB" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3B82F6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Фоновый прямоугольник с радиусом 12px, градиентом и тенью -->
  <rect x="0" y="0" width="40" height="40" rx="12" fill="url(#grad)"  />

  <!-- Центрированная иконка (прежние 32x32, но смещённая на (4,4)) -->
  <g transform="translate(4, 4)">
    <!-- Верхняя грань призмы -->
    <path d="M16 4L4 12L16 20L28 12L16 4Z" stroke="#FFFFFF" stroke-width="1.5" fill="none" />
    <!-- Нижняя грань -->
    <path d="M4 20L16 28L28 20" stroke="#FFFFFF" stroke-width="1.5" fill="none" />
    <!-- Круг в центре -->
    <circle cx="16" cy="12" r="2" fill="#FFFFFF" />
  </g>
</svg>