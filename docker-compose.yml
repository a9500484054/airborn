services:
  # PostgreSQL для AirBorn
  postgres:
    image: postgres:15-alpine
    container_name: airborn_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airborn
    ports:
      - "5433:5432"  # Другой порт, чтобы не конфликтовать
    volumes:
      - airborn_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: airborn_backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: airborn
      JWT_SECRET: airborn-dev-jwt-secret-2026
      JWT_EXPIRATION: 7d
      REFRESH_SECRET: airborn-dev-refresh-secret-2026
      REFRESH_EXPIRATION: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      MAX_FILE_SIZE: 20971520
      UPLOAD_PATH: /app/uploads
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 465
      SMTP_USER: airbornonline@yandex.ru
      SMTP_PASS: omrhvzxardmrdgdh
      EMAIL_FROM: airbornonline@yandex.ru
      REQUIRE_EMAIL_VERIFICATION: true
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3001,http://localhost:3000
    ports:
      - "3002:3000"  # Другой порт
      - "9230:9229"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - airborn_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

  # PgAdmin (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: airborn_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@airborn.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres
    volumes:
      - airborn_pgadmin_data:/var/lib/pgadmin

volumes:
  airborn_postgres_data:
  airborn_pgadmin_data:
  airborn_uploads: