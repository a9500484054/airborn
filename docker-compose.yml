services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: airborn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airborn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - airborn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airborn-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: airborn
      JWT_SECRET: airborn-production-jwt-secret-key-2026-change-in-real-deployment
      JWT_EXPIRATION: 15m
      REFRESH_SECRET: airborn-production-refresh-secret-key-2026-change
      REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: http://localhost:3001
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 20971520
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airborn-network
    command: sh -c "npm run migration:run && npm run seed && npm run start:prod"

  # Frontend (Nuxt)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: airborn-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3000/api
      NUXT_PUBLIC_WS_URL: ws://localhost:3000/chat
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - airborn-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: airborn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - airborn-network

networks:
  airborn-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
