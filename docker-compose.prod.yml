version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airborn-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: airborn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airborn-network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airborn-backend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"              # ← ДОБАВИТЬ ЭТУ СТРОКУ
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_DATABASE: airborn
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 7d
      REFRESH_SECRET: ${REFRESH_SECRET}
      REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://airborn.online}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 20971520
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 465
      SMTP_USER: airbornonline@yandex.ru
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: airbornonline@yandex.ru
      REQUIRE_EMAIL_VERIFICATION: "true"
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - airborn-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: https://airborn.online/api
    container_name: airborn-frontend
    restart: always
    ports:
      - "127.0.0.1:3001:3000"              # ← ДОБАВИТЬ ЭТУ СТРОКУ
    environment:
      NUXT_PUBLIC_API_URL: https://airborn.online/api
      NUXT_PUBLIC_WS_URL: wss://airborn.online/chat
    networks:
      - airborn-network
    depends_on:
      - backend

  # ⚠️ ВЕСЬ БЛОК nginx и certbot - УДАЛИТЬ полностью (мы используем системный nginx)
  # nginx:
  #   image: nginx:alpine
  #   ...

  # certbot:
  #   image: certbot/certbot
  #   ...

networks:
  airborn-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads: