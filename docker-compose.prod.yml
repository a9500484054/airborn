version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airborn-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: airborn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airborn-network
    # Убираем публикацию порта, используем внутреннюю сеть
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airborn-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_DATABASE: airborn
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 7d
      REFRESH_SECRET: ${REFRESH_SECRET}
      REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://airborn.online}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 20971520
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 465
      SMTP_USER: airbornonline@yandex.ru
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: airbornonline@yandex.ru
      REQUIRE_EMAIL_VERIFICATION: "true"
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - airborn-network
    depends_on:
      postgres:
        condition: service_healthy
    # Не публикуем порт 3000 наружу
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: https://airborn.online/api
    container_name: airborn-frontend
    restart: always
    environment:
      NUXT_PUBLIC_API_URL: https://airborn.online/api
      NUXT_PUBLIC_WS_URL: wss://airborn.online/chat
    networks:
      - airborn-network
    depends_on:
      - backend
    # Не публикуем порт 3000 наружу
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: airborn-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/logs:/var/log/nginx
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - airborn-network
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: airborn-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  airborn-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads: