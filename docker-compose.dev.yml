services:
  # PostgreSQL Database for development
  postgres:
    image: postgres:15-alpine
    container_name: airborn-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airborn
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - airborn-network

  # Backend (NestJS) - Development mode with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: airborn-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: airborn
      JWT_SECRET: airborn-dev-jwt-secret-key-2026
      JWT_EXPIRATION: 1h
      REFRESH_SECRET: airborn-dev-refresh-secret-key-2026
      REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: http://localhost:3001
      UPLOAD_PATH: /app/uploads
      # Email configuration (development)
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 465
      SMTP_USER: airbornonline@yandex.ru
      SMTP_PASS: omrhvzxardmrdgdh
      EMAIL_FROM: airbornonline@yandex.ru
      REQUIRE_EMAIL_VERIFICATION: "true"
      FRONTEND_URL: http://localhost:3001
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - airborn-network
    command: npm run start:dev

  # Frontend (Nuxt) - Development mode
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: airborn-frontend-dev
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3000/api
      NUXT_PUBLIC_WS_URL: ws://localhost:3000/chat
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - airborn-network
    command: npm run dev

networks:
  airborn-network:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
  backend_uploads_dev:
    driver: local
